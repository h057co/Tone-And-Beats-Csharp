name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Download Dependencies (FFmpeg & Essentia)
      run: |
        mkdir -p dependencies/ffmpeg
        mkdir -p dependencies/Essentia
        # Note: In a real scenario, you'd download these from a trusted source
        # or use a script to provision them if they are not in the repo.
        # For now, we assume the user might need to adjust this step
        # or include the binaries in the repo if they are small enough.
        echo "Please ensure dependencies are available for the build."

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish Single File
      run: dotnet publish AudioAnalyzer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/ToneAndBeatsByHostility.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
